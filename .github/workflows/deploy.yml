name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  caddy-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Caddyfile
        run: |
          docker run --rm \
            -v "$PWD/caddy:/etc/caddy:ro" \
            -e TRUSTED_PROXY_IPS=127.0.0.1/32 \
            -e DOMAIN=localhost \
            caddy:2 caddy validate --config /etc/caddy/Caddyfile

  deploy:
    needs: [caddy-validate]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/epic-stocks

            # Write .env from GitHub Secrets/Vars (VPS never stores secrets manually)
            cat > .env <<'ENVEOF'
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            GOOGLE_CLIENT_ID=${{ vars.GOOGLE_CLIENT_ID }}
            DOMAIN=${{ vars.DOMAIN }}
            APP_URL=https://${{ vars.DOMAIN }}
            ENCRYPTION_MASTER_KEY=${{ secrets.ENCRYPTION_MASTER_KEY }}
            PRIVACY_URL=${{ secrets.PRIVACY_URL }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            VAPID_PUBLIC_KEY=${{ vars.VAPID_PUBLIC_KEY }}
            VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}
            VAPID_CLAIMS_EMAIL=${{ vars.VAPID_CLAIMS_EMAIL }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            RESEND_FROM=${{ secrets.RESEND_FROM }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            TRUSTED_PROXY_IPS=${{ vars.TRUSTED_PROXY_IPS }}
            ENVEOF
            # Remove leading whitespace from heredoc
            sed -i 's/^[[:space:]]*//' .env

            # Ensure swapfile exists (idempotent)
            if [ ! -f /swapfile ]; then
              fallocate -l 2G /swapfile
              chmod 600 /swapfile
              mkswap /swapfile
              swapon /swapfile
              echo '/swapfile none swap sw 0 0' >> /etc/fstab
              echo 'vm.swappiness=10' >> /etc/sysctl.conf
              sysctl -w vm.swappiness=10
            fi

            git fetch origin main
            git reset --hard origin/main
            docker compose build

            # Stop the app so its DB connections are fully released before migration
            docker compose stop app

            # Run migrations in isolation — full output visible in deploy log
            echo "Running database migrations..."
            docker compose run --rm --no-deps app \
              python -m alembic -c /app/alembic.ini upgrade head
            echo "Migrations complete."

            # Start all services and wait for healthchecks to pass
            docker compose up -d --wait --wait-timeout 120

            # Graceful config reload — directory mount means git reset --hard
            # doesn't break the inode, so caddy reload correctly picks up changes.
            docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile
