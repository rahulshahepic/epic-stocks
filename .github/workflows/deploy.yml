name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  caddy-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Caddyfile
        run: |
          docker run --rm \
            -v "$PWD/Caddyfile:/etc/caddy/Caddyfile:ro" \
            -e TRUSTED_PROXY_IPS=127.0.0.1/32 \
            -e DOMAIN=localhost \
            caddy:2 caddy validate --config /etc/caddy/Caddyfile

  deploy:
    needs: [caddy-validate]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/epic-stocks

            # Write .env from GitHub Secrets/Vars (VPS never stores secrets manually)
            cat > .env <<'ENVEOF'
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            GOOGLE_CLIENT_ID=${{ vars.GOOGLE_CLIENT_ID }}
            DOMAIN=${{ vars.DOMAIN }}
            APP_URL=https://${{ vars.DOMAIN }}
            ENCRYPTION_MASTER_KEY=${{ secrets.ENCRYPTION_MASTER_KEY }}
            PRIVACY_URL=${{ secrets.PRIVACY_URL }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            VAPID_PUBLIC_KEY=${{ vars.VAPID_PUBLIC_KEY }}
            VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}
            VAPID_CLAIMS_EMAIL=${{ vars.VAPID_CLAIMS_EMAIL }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            RESEND_FROM=${{ secrets.RESEND_FROM }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            TRUSTED_PROXY_IPS=${{ vars.TRUSTED_PROXY_IPS }}
            ENVEOF
            # Remove leading whitespace from heredoc
            sed -i 's/^[[:space:]]*//' .env

            # Ensure swapfile exists (idempotent)
            if [ ! -f /swapfile ]; then
              fallocate -l 2G /swapfile
              chmod 600 /swapfile
              mkswap /swapfile
              swapon /swapfile
              echo '/swapfile none swap sw 0 0' >> /etc/fstab
              echo 'vm.swappiness=10' >> /etc/sysctl.conf
              sysctl -w vm.swappiness=10
            fi

            git fetch origin main
            git reset --hard origin/main
            docker compose build

            # --- Step 1: stop the app so its DB connections are fully released ---
            docker compose stop app

            # --- Step 2: run migrations in isolation before the app starts ---
            # Full output is visible here; any lock/error surfaces immediately.
            echo "Running database migrations..."
            docker compose run --rm --no-deps app \
              python -m alembic -c /app/alembic.ini upgrade head
            echo "Migrations complete."

            # --- Step 3: start all services ---
            docker compose up -d

            # Poll /api/health for up to 120s
            echo "Waiting for /api/health..."
            for i in $(seq 1 24); do
              if curl -fsS http://localhost/api/health | grep -q '"ok"'; then
                echo "Health check passed."
                exit 0
              fi
              echo "  attempt $i/24 failed, waiting 5s..."
              sleep 5
            done

            echo "ERROR: /api/health did not return ok after 120s."
            echo ""
            echo "=== docker compose ps ==="
            docker compose ps
            echo ""
            echo "=== app logs ==="
            docker compose logs app --tail=60
            echo ""
            echo "=== recent commits ==="
            git log --oneline -5
            echo ""
            echo "MANUAL ROLLBACK INSTRUCTIONS:"
            echo "  1. Check migration state:"
            echo "     docker compose exec db psql -U postgres -d vesting -c 'SELECT version_num FROM alembic_version;'"
            echo "  2. If no schema migration ran, roll back code:"
            echo "     git checkout <previous-sha> && docker compose build && docker compose up -d"
            echo "  3. If a schema migration ran, manually revert the migration before rolling back code."
            echo "     Rolling back code after a migration without reverting Alembic is unsafe."
            exit 1
