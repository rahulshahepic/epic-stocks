name: Security Audit
on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:
jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - run: pip install pip-audit
      - run: pip-audit -r backend/requirements.txt
