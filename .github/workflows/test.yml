name: Test
on:
  pull_request:
  push:
    branches: [main]
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements.txt pytest pytest-asyncio httpx
      - run: pytest backend/tests/ -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd frontend && npm ci
      - run: cd frontend && npm run test

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: pip install -r backend/requirements.txt
      - run: cd frontend && npm ci && npm run build
      - run: cd frontend && npx playwright install chromium
      - name: Start backend and frontend, run E2E tests
        env:
          E2E_TEST: "1"
          JWT_SECRET: "e2e-test-secret"
        run: |
          cd backend && E2E_TEST=1 uvicorn main:app --host 0.0.0.0 --port 8000 &
          cd frontend && npx vite --port 5173 &
          sleep 5
          cd frontend && npx playwright test
