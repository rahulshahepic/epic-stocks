name: Test
on:
  pull_request:
  push:
    branches: [main, staging]
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt pytest pytest-asyncio httpx
      - run: pytest backend/tests/ -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm audit --audit-level=high
      - run: cd frontend && npm run test

  caddy-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Caddyfile
        run: |
          docker run --rm \
            -v "$PWD/caddy:/etc/caddy:ro" \
            -e TRUSTED_PROXY_IPS=127.0.0.1/32 \
            -e DOMAIN=localhost \
            caddy:2 caddy validate --config /etc/caddy/Caddyfile

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npx tsc -b --noEmit
      - uses: docker/setup-buildx-action@v3
      - name: Build e2e-app image (cached)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          load: true
          tags: epic-stocks-e2e-app:ci
          cache-from: type=gha,scope=e2e-app
          cache-to: type=gha,mode=max,scope=e2e-app
      - name: Build playwright image (cached)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.e2e
          load: true
          tags: epic-stocks-playwright:ci
          cache-from: type=gha,scope=playwright
          cache-to: type=gha,mode=max,scope=playwright
      - run: |
          docker compose -f docker-compose.e2e.yml up --abort-on-container-exit --exit-code-from playwright
          docker compose -f docker-compose.e2e.yml down -v
