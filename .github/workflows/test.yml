name: Test
on:
  pull_request:
  push:
    branches: [main, staging]
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Cache status
        run: echo "pip cache-hit=${{ steps.setup-python.outputs.cache-hit }}"
      - name: Install deps
        run: |
          echo "::group::pip install"
          time pip install -r backend/requirements.txt pytest pytest-asyncio httpx
          echo "::endgroup::"
      - name: Run tests
        run: |
          echo "::group::pytest"
          time pytest backend/tests/ -v --durations=20
          echo "::endgroup::"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Cache status
        run: echo "npm cache-hit=${{ steps.setup-node.outputs.cache-hit }}"
      - name: Install deps
        run: cd frontend && time npm ci
      - name: Type-check
        run: cd frontend && time npx tsc -b --noEmit
      - name: npm audit
        run: cd frontend && time npm audit --audit-level=high
      - name: Run tests
        run: cd frontend && time npm run test

  caddy-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Caddyfile
        run: |
          docker run --rm \
            -v "$PWD/caddy:/etc/caddy:ro" \
            -e TRUSTED_PROXY_IPS=127.0.0.1/32 \
            -e DOMAIN=localhost \
            caddy:2 caddy validate --config /etc/caddy/Caddyfile

  e2e:
    runs-on: ubuntu-latest
    # No setup-node / npm ci / tsc here — the frontend job covers npm install,
    # audit, vitest, and type-checking. The e2e runner only orchestrates Docker:
    # Dockerfile.e2e does its own `npm ci` inside the playwright image.
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build e2e-app image (cached)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          load: true
          tags: epic-stocks-e2e-app:ci
          cache-from: type=gha,scope=e2e-app
          cache-to: type=gha,mode=max,scope=e2e-app
      - name: Build playwright image (cached)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.e2e
          load: true
          tags: epic-stocks-playwright:ci
          cache-from: type=gha,scope=playwright
          cache-to: type=gha,mode=max,scope=playwright
      - name: Run e2e tests
        run: |
          time docker compose -f docker-compose.e2e.yml up --abort-on-container-exit --exit-code-from playwright
          docker compose -f docker-compose.e2e.yml down -v
