services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vesting
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    container_name: epic-stocks-app   # referenced by name in caddy/app.caddy
    build:
      context: .
      args:
        COMMIT_SHA: ${COMMIT_SHA:-dev}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-changeme}@db:5432/vesting
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - OIDC_PROVIDERS=${OIDC_PROVIDERS:-[]}
      - KEY_ENCRYPTION_KEY=${KEY_ENCRYPTION_KEY}
      - LEGACY_MASTER_KEY=${LEGACY_MASTER_KEY:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-resend}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM=${RESEND_FROM:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}

      - EPIC_MODE=${EPIC_MODE:-}
      - CACHE_INVALIDATE_SECRET=${CACHE_INVALIDATE_SECRET:-}
      - APP_URL=${APP_URL:-}
    expose:
      - "8000"
    networks:
      - internal
      - proxy        # connects to the shared Caddy proxy network

volumes:
  pg_data:
  appdata:

networks:
  internal:
  proxy:
    external: true   # must be created by infra/docker-compose.infra.yml first
