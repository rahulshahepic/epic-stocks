<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a5f3fc"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Chart line going up -->
  <polyline points="100,360 180,320 240,340 300,240 360,200 420,120"
    fill="none" stroke="url(#line)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow tip -->
  <polygon points="420,120 390,155 415,165" fill="#34d399"/>
  <!-- Dollar sign -->
  <text x="128" y="200" font-family="Arial,sans-serif" font-weight="bold" font-size="120" fill="rgba(255,255,255,0.25)">$</text>
</svg>
